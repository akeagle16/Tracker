<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Implementation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFBFE; --card:#FFFFFF; --ink:#1A2238; --muted:#5B6478;
    --grid:#C9D2EE; --soft:#EEF1FA; --banner:#3B5BB5;
    --ontrack:#2E6FD0; --blocked:#C23B2E; --neutral:#7A8194;
    --progress:#7C5CC4; --done:#4C8A3F; --today:#C8392B;
    --cf-bg:#FBF0EE; --cf-line:#E3B7B0;
    --display:'Archivo','Arial Narrow',Arial,sans-serif;
    --body:'Inter',system-ui,Arial,sans-serif;
    --mono:'IBM Plex Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45;padding:28px 32px 48px}
  .wrap{max-width:1240px;margin:0 auto}

  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--banner);text-transform:uppercase}
  h1{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.01em;margin-top:2px}
  .updated{font-family:var(--mono);font-size:12px;color:var(--muted);padding-bottom:4px}

  /* ---- the wire ---- */
  .wire{position:relative;margin:34px 0 10px;height:96px;border:1px solid var(--grid);border-radius:10px;background:
    repeating-linear-gradient(90deg, transparent 0, transparent calc(12.5% - 1px), var(--soft) calc(12.5% - 1px), var(--soft) 12.5%);
    background-color:#fff}
  .wire .axis{position:absolute;left:0;right:0;top:58px;height:2px;background:var(--grid)}
  .wire .tick-label{position:absolute;top:74px;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--muted)}
  .wire .star{position:absolute;top:50px;transform:translateX(-50%);font-size:17px;color:var(--ink);line-height:1}
  .wire .star-label{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:10.5px;color:var(--ink);white-space:nowrap}
  .wire .star-label.up{top:30px}
  .wire .star-label.up2{top:14px}
  .wire .today-line{position:absolute;top:8px;bottom:8px;width:0;border-left:2px dashed var(--today)}
  .wire .today-label{position:absolute;top:8px;transform:translateX(4px);font-family:var(--mono);font-size:10px;font-weight:500;color:var(--today)}
  .wire .wire-title{position:absolute;top:8px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}

  /* ---- stats ---- */
  .stats{display:flex;gap:12px;margin:18px 0 30px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--grid);border-radius:10px;padding:12px 18px;min-width:118px}
  .stat b{display:block;font-family:var(--display);font-size:26px;font-weight:700}
  .stat span{font-size:11.5px;color:var(--muted)}
  .stat.alert b{color:var(--blocked)}
  .stat.ok b{color:var(--ontrack)}

  /* ---- projects ---- */
  .section-label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:36px}
  .card{background:var(--card);border:1px solid var(--grid);border-radius:12px;padding:18px 20px}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card h2{font-family:var(--display);font-weight:700;font-size:17px}
  .chip{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;padding:3px 9px;border-radius:99px;border:1px solid var(--ink);white-space:nowrap}
  .chip.on_track{background:#E7F0FD;color:var(--ontrack);border-color:var(--ontrack)}
  .chip.blocked{background:#FBEAE8;color:var(--blocked);border-color:var(--blocked)}
  .chip.planning,.chip.not_started{background:var(--soft);color:var(--neutral);border-color:var(--neutral)}
  .chip.in_progress{background:#F1ECFB;color:var(--progress);border-color:var(--progress)}
  .serves{font-size:12.5px;color:var(--muted);margin:4px 0 12px}
  .next{background:var(--soft);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px}
  .next .due{font-family:var(--mono);font-weight:500}
  .modules{list-style:none}
  .modules li{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:13px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dot.done{background:var(--done)} .dot.in_progress{background:var(--progress)}
  .dot.not_started{background:#C2C8D6}
  .modules .when{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .blocker{margin-top:12px;background:var(--cf-bg);border:1px solid var(--cf-line);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--blocked)}
  .notes{margin-top:10px;font-size:12.5px;color:var(--muted)}

  /* ---- carry-forwards ---- */
  .cf{background:var(--cf-bg);border:1px solid var(--cf-line);border-radius:10px;padding:13px 16px;display:flex;gap:14px;align-items:baseline;margin-bottom:10px;flex-wrap:wrap}
  .cf .item{flex:1 1 480px;font-size:13.5px}
  .cf .meta{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .cf .state{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blocked)}

  footer{margin-top:34px;border-top:1px solid var(--grid);padding-top:14px;font-size:12px;font-style:italic;color:var(--muted)}

  @media (prefers-reduced-motion:no-preference){
    .card,.stat,.wire{animation:rise .35s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
  @media (max-width:640px){body{padding:18px 14px}.wire .star-label{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Clay White — Product Implementation, VusionGroup</div>
      <h1>Product Implementation Tracker</h1>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <div class="wire" id="wire"><span class="wire-title">Committed dates — Jun 8 to Jul 27</span></div>

  <div class="stats" id="stats"></div>

  <div class="section-label">Projects</div>
  <div class="grid" id="projects"></div>

  <div class="section-label" id="cf-label">Carry-Forwards</div>
  <div id="cfs"></div>

  <footer id="principles"></footer>
</div>

<script>
/* ============================================================
   TRACKER DATA — Claude Code: when regenerating this dashboard,
   replace ONLY the TRACKER constant below with the current
   contents of tracker.json. Do not modify markup or styles.
   ============================================================ */
const TRACKER = {
  "meta": {
    "owner": "Clay White — Director of Product Implementation, VusionGroup",
    "last_updated": "2026-06-17"
  },
  "projects": [
    {
      "id": "topstock-companion-app",
      "name": "TopStock Companion App",
      "serves": "TopStock Rail — Walmart (5 Gen1 stores, AR/TX)",
      "status": "at_risk",
      "modules": [
        { "name": "Install", "status": "done", "completed": "2026-06-11" },
        { "name": "Guided TopStock Demo", "status": "in_progress", "due": "2026-06-17" },
        { "name": "Validation (labor-state board)", "status": "in_progress", "due": "2026-06-22" },
        { "name": "Maintenance", "status": "in_progress", "due": "2026-07-10" }
      ],
      "next_milestone": "Validation live on the 100-rail test install",
      "next_milestone_due": "2026-06-22",
      "blockers": [
        "Eric — Validation pipeline fix (hardware-state → UI). Pending Titouan mtg 6/16; Eric's wall is Fri 6/19 midday CT.",
        "Cristina — add/delete Sections build; ETA pending.",
        "Supervisor RBAC — installers → Install, supervisors → Validation."
      ],
      "notes": "Real deadline is the 100-rail test install Mon 6/22 (6/19 was a proxy; Gen2 can't run on Gen1, so the test site is the validation opportunity). Validation = supervisor labor-state board (not-yet-installed → installed-not-tested → tested-not-passed → passed) producing the digital QC record; Zel does physical inspection. No-weekend rule: 6/20–21 parachute-only, cross-team work done by Fri 6/19. Wed 6/17 go/no-go. Demo built but unvalidated — needs HW/SW integration test (also confirms rail function), lead domino early week. Maintenance UI delivered; remaining monitoring & alerting is net-new backend, scoped separately, real deadline tracks rail deployment."
    },
    {
      "id": "qc-tool",
      "name": "QC Tool — Post-Install Inspection",
      "serves": "TopStock Rail / Walmart first; multi-product later",
      "status": "in_progress",
      "modules": [
        { "name": "v1 (Working)", "status": "in_progress", "due": "2026-07-10" },
        { "name": "Complete w/ images", "status": "not_started", "due": "2026-07-25" }
      ],
      "next_milestone": "v1 (Working) complete",
      "next_milestone_due": "2026-07-10",
      "blockers": [],
      "notes": "v1 (7/10) = one image-ready UI + data pull reusing Eric's pipeline + text deficiencies + hosted + internal-only RBAC. Complete-with-images ~7/25 gated on the image-storage decision. Full audit loop works end-to-end against mock store 100 (adapter picker → scanner → 3-step questions → save → home); completed rails persist to IndexedDB and home counts advance live. audit_questions = adapter checks + shared rail checks + ESL three-way (Correct/Wrong Location/No Image). Scanner: manual entry XXXX-XXXX gated on 8-char ID, duplicates warn-and-overwrite (latest wins), confirm-location modal no longer opens on load. Sampling locked ±7% = 167 rails (8 zones, zone = leading alpha of section code), 85/10/5 fill-as-you-go. Open: derived_severity rules, View Data dashboard, Warehouse/Wire Frame wording, third adapter, Azure-vs-Supabase backend decision."
    },
    {
      "id": "gt-tool-v2",
      "name": "GT Tool v2",
      "serves": "Captana — Sainsbury's (4 UK stores)",
      "status": "blocked",
      "modules": [],
      "next_milestone": "Scope decision: build v2 vs adopt/adapt France tool",
      "next_milestone_due": "2026-06-16",
      "blockers": [
        "Parked pending France lead reply (expected 6/16) — France may already run a tool; v2 may become adopt/adapt rather than build."
      ],
      "notes": "Parked and deprioritized — decoupled from the Sainsbury's push (Walmart always wins). Prior 6/26 build target on hold pending scope decision. v1 live. Outcome = eliminate manual image-checking."
    },
    {
      "id": "site-survey-tool",
      "name": "Site Survey Tool",
      "serves": "Multi-product, ESL-first",
      "status": "at_risk",
      "modules": [],
      "next_milestone": "Measurement-proof validation results (present Wed AM 6/24)",
      "next_milestone_due": "2026-06-23",
      "blockers": [
        "Work MacBook locked — gating the MeshWalk build (IT ticket: unlock + Xcode + Apple-ID signing). Mitigation: Polycam + Apple Measure staged on the phone (same ARKit + LiDAR stack), so Friday capture proceeds regardless."
      ],
      "notes": "Moved from discovery into a measurement-proof sprint. Framework settled: build on ARKit scene-reconstruction mesh + LiDAR, NOT RoomPlan (its furniture taxonomy + ~2,000 sq ft single-scan ceiling don't fit retail at store scale; own the interpretation step). Hardware: usable LiDAR + ARKit only on iPhone Pro / iPad Pro — accepted tradeoff. Direction deck (7 slides, RF Slate) + v0.0.01 demo presented to the technical group, well received; key challenge = prove accuracy. Validation: tape vs tool across shelf bay width, shelf height, gondola length/depth, aisle width, error bands vs ±0.5 inch, honest pass/fail; tiered (T0 methodology → T1 controlled accuracy → T2 real aisle → T3 derived counts). MeshWalk mesh-viewer (iPhone 16 Pro + M4 MBA); Polycam fallback. Plan to 6/24: Fri 6/19 real store aisle capture is the critical day. Risk: capture proceeds Friday with Polycam regardless — the question is the sensor, not the code. Build sequence (post-proof): 1 Capture spine → 2 Data + RF → 3 Derived outputs → 4 Demo store; backlog tracked in tracker.json (OCR label normalization, privacy/imagery, cart-mount design, degradation modes, RF-derived anchor placement). Build base = raw ARKit, not an existing scanner engine (export-only / not embeddable) — interpretation + capture UX stay in-house; Polycam is a validation fallback only."
    },
    {
      "id": "esl-maintenance-app",
      "name": "ESL Maintenance App",
      "serves": "ESL service at Sainsbury's",
      "status": "blocked",
      "modules": [],
      "next_milestone": "Build from framework once data lands",
      "next_milestone_due": "2026-06-19",
      "blockers": ["Waiting on Jessie's ESL data pull — start immediately when received"],
      "notes": "Quick build: copying framework from an existing app."
    }
  ],
  "carry_forwards": [
    { "item": "Definitive answer on camera-behind-glass scope (Sainsbury's Captana pilot)", "owner": "Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "Blink ID corrective-action follow-up (Sainsbury's)", "owner": "Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "Blink ID reliability — random, non-reproducible ESL misses; no command ack, retry, or event-level traceability", "owner": "Nick + Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "QC inspection-checklist wording (Warehouse + Wire Frame) provisional — pending team/engineering; Standard confirmed 6/16; third adapter unreleased", "owner": "Clay + team/eng", "opened": "2026-06-16", "status": "Open" },
    { "item": "QC derived_severity rules undefined — answer-to-severity mapping not yet specified", "owner": "Clay", "opened": "2026-06-17", "status": "Open" },
    { "item": "QC View Data dashboard not built — read/review surface over saved sessions", "owner": "Clay", "opened": "2026-06-17", "status": "Open" },
    { "item": "QC backend hosting decision (Azure vs Supabase) pending the Azure tenant answer — gates the 'hosted' part of v1", "owner": "Clay", "opened": "2026-06-16", "status": "Open" }
  ],
  "operating_principles": [
    "Deployment-to-results: every performance result tied to a specific deployment config (this config = this performance = this cost)",
    "Unresolved gaps carry forward every week without exception",
    "Track timelines by owner, commitment, and outcome — not by who is nominally in charge"
  ]
};
/* ================== END TRACKER DATA ====================== */

const $ = id => document.getElementById(id);
const fmt = d => { const [y,m,day] = d.split("-"); return `${+m}/${+day}`; };
const STATUS_LABEL = {on_track:"ON TRACK",blocked:"BLOCKED",planning:"PLANNING",not_started:"NOT STARTED",in_progress:"IN PROGRESS",done:"DONE",at_risk:"AT RISK",escalation:"ESCALATION"};

$("updated").textContent = "last updated " + TRACKER.meta.last_updated;

/* ---- the wire ---- */
(function wire(){
  const start = new Date("2026-06-08T00:00:00"), end = new Date("2026-07-27T00:00:00");
  const span = end - start;
  const pos = d => Math.min(98, Math.max(2, ((new Date(d+"T00:00:00") - start) / span) * 100));
  const w = $("wire");
  w.insertAdjacentHTML("beforeend", `<div class="axis"></div>`);
  ["2026-06-08","2026-06-15","2026-06-22","2026-06-29","2026-07-06","2026-07-13","2026-07-20","2026-07-27"]
    .forEach(d => w.insertAdjacentHTML("beforeend", `<span class="tick-label" style="left:${pos(d)}%">${fmt(d)}</span>`));

  const miles = [];
  TRACKER.projects.forEach(p => {
    if (p.next_milestone_due) miles.push({ d: p.next_milestone_due, label: p.name.split("—")[0].trim() });
    (p.modules||[]).forEach(m => {
      if (m.due && m.status !== "done" && m.due !== p.next_milestone_due)
        miles.push({ d: m.due, label: m.name });
    });
  });
  miles.sort((a,b)=>a.d.localeCompare(b.d));
  let lastPos = -100, level = 0;
  miles.forEach(m => {
    const x = pos(m.d);
    level = (x - lastPos < 9) ? (level+1)%2 : 0;
    lastPos = x;
    w.insertAdjacentHTML("beforeend",
      `<span class="star" style="left:${x}%">★</span>
       <span class="star-label ${level? "up2":"up"}" style="left:${x}%">${m.label} · ${fmt(m.d)}</span>`);
  });

  const today = new Date();
  if (today >= start && today <= end){
    const t = ((today - start)/span)*100;
    w.insertAdjacentHTML("beforeend",
      `<div class="today-line" style="left:${t}%"></div>
       <span class="today-label" style="left:${t}%">TODAY</span>`);
  }
})();

/* ---- stats ---- */
(function stats(){
  const c = s => TRACKER.projects.filter(p=>p.status===s).length;
  const items = [
    {n:c("on_track"),l:"On Track",cls:"ok"},
    {n:c("blocked")+c("escalation"),l:"Blocked",cls:"alert"},
    {n:c("planning"),l:"Planning",cls:""},
    {n:c("not_started"),l:"Not Started",cls:""},
    {n:TRACKER.carry_forwards.filter(x=>x.status!=="Resolved").length,l:"Carry-Forwards",cls:"alert"},
  ];
  $("stats").innerHTML = items.map(i=>`<div class="stat ${i.cls}"><b>${i.n}</b><span>${i.l}</span></div>`).join("");
})();

/* ---- projects ---- */
$("projects").innerHTML = TRACKER.projects.map(p => `
  <div class="card">
    <div class="card-top"><h2>${p.name}</h2><span class="chip ${p.status}">${STATUS_LABEL[p.status]||p.status}</span></div>
    <div class="serves">${p.serves}</div>
    <div class="next"><b>Next:</b> ${p.next_milestone}${p.next_milestone_due ? ` — <span class="due">due ${fmt(p.next_milestone_due)}</span>` : ` — <span class="due">date TBD</span>`}</div>
    ${(p.modules&&p.modules.length)? `<ul class="modules">${p.modules.map(m=>`
      <li><span class="dot ${m.status}"></span>${m.name}
      <span class="when">${m.status==="done" ? "done "+fmt(m.completed) : "due "+fmt(m.due)}</span></li>`).join("")}</ul>` : ""}
    ${(p.blockers&&p.blockers.length)? p.blockers.map(b=>`<div class="blocker">${b}</div>`).join("") : ""}
    ${p.notes? `<div class="notes">${p.notes}</div>` : ""}
  </div>`).join("");

/* ---- carry-forwards ---- */
const openCfs = TRACKER.carry_forwards.filter(x=>x.status!=="Resolved");
$("cf-label").textContent = `Carry-Forwards — ${openCfs.length} open (flagged weekly until resolved)`;
$("cfs").innerHTML = openCfs.map(c => {
  let weeks = "date TBD";
  if (c.opened){ weeks = Math.floor((new Date() - new Date(c.opened+"T00:00:00"))/(7*864e5)) + " wks open"; }
  return `<div class="cf"><div class="item">${c.item}</div>
    <span class="meta">${c.owner||"—"} · opened ${c.opened?fmt(c.opened):"TBD"} · ${weeks}</span>
    <span class="state">${c.status.toUpperCase()}</span></div>`;
}).join("");

$("principles").textContent = "Operating principles: " + TRACKER.operating_principles.join(" · ");
</script>
</body>
</html>
