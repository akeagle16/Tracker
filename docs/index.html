<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Implementation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFBFE; --card:#FFFFFF; --ink:#1A2238; --muted:#5B6478;
    --grid:#C9D2EE; --soft:#EEF1FA; --banner:#3B5BB5;
    --ontrack:#2E6FD0; --blocked:#C23B2E; --neutral:#7A8194;
    --progress:#7C5CC4; --done:#4C8A3F; --today:#C8392B; --atrisk:#D9892B;
    --cf-bg:#FBF0EE; --cf-line:#E3B7B0;
    --display:'Archivo','Arial Narrow',Arial,sans-serif;
    --body:'Inter',system-ui,Arial,sans-serif;
    --mono:'IBM Plex Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45;padding:28px 32px 48px}
  .wrap{max-width:1240px;margin:0 auto}

  header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--banner);text-transform:uppercase}
  h1{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.01em;margin-top:2px}
  .updated{font-family:var(--mono);font-size:12px;color:var(--muted);padding-bottom:4px}

  /* ---- the wire ---- */
  .wire{position:relative;margin:34px 0 10px;height:96px;border:1px solid var(--grid);border-radius:10px;background:
    repeating-linear-gradient(90deg, transparent 0, transparent calc(12.5% - 1px), var(--soft) calc(12.5% - 1px), var(--soft) 12.5%);
    background-color:#fff}
  .wire .axis{position:absolute;left:0;right:0;top:58px;height:2px;background:var(--grid)}
  .wire .tick-label{position:absolute;top:74px;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--muted)}
  .wire .star{position:absolute;top:50px;transform:translateX(-50%);font-size:17px;color:var(--ink);line-height:1}
  .wire .star-label{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:10.5px;color:var(--ink);white-space:nowrap}
  .wire .star-label.up{top:30px}
  .wire .star-label.up2{top:14px}
  .wire .today-line{position:absolute;top:8px;bottom:8px;width:0;border-left:2px dashed var(--today)}
  .wire .today-label{position:absolute;top:8px;transform:translateX(4px);font-family:var(--mono);font-size:10px;font-weight:500;color:var(--today)}
  .wire .wire-title{position:absolute;top:8px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}

  /* ---- stats ---- */
  .stats{display:flex;gap:12px;margin:18px 0 30px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--grid);border-radius:10px;padding:12px 18px;min-width:118px}
  .stat b{display:block;font-family:var(--display);font-size:26px;font-weight:700}
  .stat span{font-size:11.5px;color:var(--muted)}
  .stat.alert b{color:var(--blocked)}
  .stat.ok b{color:var(--ontrack)}
  .stat.warn b{color:var(--atrisk)}

  /* ---- projects ---- */
  .section-label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:36px}
  .card{background:var(--card);border:1px solid var(--grid);border-radius:12px;padding:18px 20px}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card h2{font-family:var(--display);font-weight:700;font-size:17px}
  .chip{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;padding:3px 9px;border-radius:99px;border:1px solid var(--ink);white-space:nowrap}
  .chip.on_track{background:#E7F0FD;color:var(--ontrack);border-color:var(--ontrack)}
  .chip.blocked{background:#FBEAE8;color:var(--blocked);border-color:var(--blocked)}
  .chip.planning,.chip.not_started{background:var(--soft);color:var(--neutral);border-color:var(--neutral)}
  .chip.in_progress{background:#E7F0FD;color:var(--ontrack);border-color:var(--ontrack)}
  .chip.at_risk{background:#FBF1E4;color:var(--atrisk);border-color:var(--atrisk)}
  .serves{font-size:12.5px;color:var(--muted);margin:4px 0 12px}
  .next{background:var(--soft);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px}
  .next .due{font-family:var(--mono);font-weight:500}
  .modules{list-style:none}
  .modules li{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:13px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dot.done{background:var(--done)} .dot.in_progress{background:var(--ontrack)}
  .dot.not_started{background:#C2C8D6} .dot.at_risk{background:var(--atrisk)}
  .modules .when{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .blocker{margin-top:12px;background:var(--cf-bg);border:1px solid var(--cf-line);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--blocked)}
  .notes{margin-top:10px;font-size:12.5px;color:var(--muted)}

  /* ---- carry-forwards ---- */
  .cf{background:var(--cf-bg);border:1px solid var(--cf-line);border-radius:10px;padding:13px 16px;display:flex;gap:14px;align-items:baseline;margin-bottom:10px;flex-wrap:wrap}
  .cf .item{flex:1 1 480px;font-size:13.5px}
  .cf .meta{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .cf .state{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--blocked)}

  footer{margin-top:34px;border-top:1px solid var(--grid);padding-top:14px;font-size:12px;font-style:italic;color:var(--muted)}

  @media (prefers-reduced-motion:no-preference){
    .card,.stat,.wire{animation:rise .35s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
  @media (max-width:640px){body{padding:18px 14px}.wire .star-label{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Clay White — Product Implementation, VusionGroup</div>
      <h1>Product Implementation Tracker</h1>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <div class="wire" id="wire"><span class="wire-title">Committed dates — Jun 8 to Jul 27</span></div>

  <div class="stats" id="stats"></div>

  <div class="section-label">Projects</div>
  <div class="grid" id="projects"></div>

  <div class="section-label" id="cf-label">Carry-Forwards</div>
  <div id="cfs"></div>

  <footer id="principles"></footer>
</div>

<script>

      "notes": "v1 (7/10) = one image-ready UI + data pull reusing Eric's pipeline + text deficiencies + hosted + internal-only RBAC. Complete-with-images ~7/25 gated on the image-storage decision. Full audit loop works end-to-end against mock store 100 (adapter picker → scanner → 3-step questions → save → home); completed rails persist to IndexedDB and home counts advance live. audit_questions = adapter checks + shared rail checks + ESL three-way (Correct/Wrong Location/No Image). Scanner: manual entry XXXX-XXXX gated on 8-char ID, duplicates warn-and-overwrite (latest wins), confirm-location modal no longer opens on load. Sampling locked ±7% = 167 rails (8 zones, zone = leading alpha of section code), 85/10/5 fill-as-you-go. View-Data/PC dashboard built (data_dashboard.html): cross-filter donuts (all/adapter/rail), per-adapter cards, completion bar, store/zone/adapter filters, CSV export; reads all records across sessions; store-stamped saves; in-memory demo mode (off by default); nav reordered (activity before store pick); auto-save-per-rail. Open: derived_severity rules, Warehouse/Wire Frame wording, third adapter, Azure-vs-Supabase backend decision."

      "next_milestone_due": "2026-07-03",
      "blockers": [],
      "notes": "ARKit is the foundation of the internal build (scene-reconstruction mesh + LiDAR, NOT RoomPlan — furniture taxonomy + ~2,000 sq ft single-scan ceiling don't fit retail at store scale; own the interpretation step). Polycam / Matterport are build-vs-buy ALTERNATIVES, not a fallback — if ARKit can't prove out, escalate build-vs-buy. ARKit testing is planned work, not a threat. Hardware: usable LiDAR + ARKit only on iPhone Pro / iPad Pro — accepted tradeoff. Direction deck (7 slides, RF Slate) + v0.0.01 demo presented to the technical group, well received; key challenge = prove accuracy (±0.5 inch, error bands, honest pass/fail; tiered T0→T1→T2→T3). Built AisleMeasure (native ARKit + LiDAR): tap-to-measure validation (labeled measurements, CSV error-table export) + walk-the-aisle auto-capture (Vision ESL tag counting w/ 3D dedup, LiDAR-mesh shelf detection, per-section width/shelf/tag breakdown, drift estimate, CSV). Section segmentation (bay-boundary detection) is the first iteration area — v1 under-segments butted bays (cf-sitesurvey-segmentation). Expectation-vs-reality validation workbook mirrors both CSV exports. Building AND running on iPhone 15 Pro (LiDAR, iOS 26.4) via free Apple ID signing (7-day profile, re-run from Xcode to renew) against Xcode iOS 26.5 SDK. Distribution trigger: $99/yr Apple Developer account + TestFlight, pulled once the tool is validated. Dev/test = personal iPhone 15 Pro (work phone excluded, likely MDM). Capture validation on real fixtures: LiDAR mesh dense/clean at cart distance, depth gradient separates near run from far aisle. Orientation gating added — learns facing from vertical shelf-panel normals, rejects cross-aisle geometry depth gating can't; discard/file-separately switch feeds future whole-store stitching. Capture rig: clamp on cart child-seat bar, phone ~45° at left-side shelving (mount angle = fixed design param for the cart holder). Setup gauntlet cleared (signing, Developer Mode, trust, camera permission, iOS 17 target). Core detectors VALIDATED on real fixtures: tag count 101 vs 104 actual (97%), 3 sections found for 3 walked. Near-plane gate REMOVED entirely — it was rejecting up to 100% of detections (wrong diagonal cart-mount assumptions), the root saboteur on both pipelines. All detection off the main thread (fixed freeze); tag positions now from LiDAR depth unprojection, not ARView raycast. Debug overlay (detection boxes, shelf-candidate dots, per-stage counters) + gating toggle = diagnose by sight. UI: length in feet-and-inches, summarize backgrounded w/ spinner, total shelf count cumulative across sections (BOM-relevant), world-space boundary bar (raycast at fixed left-third) to mark a start/stop span vs tape; side hardcoded LEFT pending UI. Length: within-session tight (~1–2 in) but angle-sensitive (8-in session swings off 45°). KEY INSIGHT 'rigid breaks, flexible works' — must tolerate cart/angle wobble, not assume fixed 45°. Raycast drift-stable (shrugged off 31.6-in deviation), camera-travel inflated under drift; built a drift-immune shelf-derived aisle axis (pending straight-vs-drift validation). Operating envelope: min standoff bounded by camera FOV (can't get 81-in top shelf below ~42 in at 45°), max by precision-vs-distance — fixed-angle production cart mount is load-bearing. Next problem after length = shelf-edge definition (dots on the lip where tags live). Open carry-forwards: tag-detector false-positives (cf-sitesurvey-tag-detector), tag-density-gap segmentation untested on butted bays (cf-sitesurvey-segmentation), ~13-in systematic short-read offset uncharacterized (cf-sitesurvey-length-offset). Built a standalone timeline drill-down (QC/GT Gantt format); deck element: orange diamond = go/no-go. Phased 6-week runway: general design DONE (wk 6/15); Prove ARKit/capture spine → go/no-go ~7/3 (highest-leverage — gates downstream phases + the internal-build-vs-buy thesis); Data + RF ~6/29–7/15; align derived outputs w/ broader team ~7/13–7/22; in-store demo committed wk of 7/27. Build sequence: 1 Capture spine → 2 Data + RF → 3 Derived outputs → 4 Demo store; backlog in tracker.json."
    },
    {
      "id": "esl-maintenance-app",
      "name": "ESL Maintenance App",
      "serves": "ESL service at Sainsbury's",
      "status": "blocked",
      "modules": [],
      "next_milestone": "Build from framework once data lands",
      "next_milestone_due": "2026-06-19",
      "blockers": ["Waiting on Jessie's ESL data pull — start immediately when received"],
      "notes": "Quick build: copying framework from an existing app."
    }
  ],
  "carry_forwards": [
    { "item": "Definitive answer on camera-behind-glass scope (Sainsbury's Captana pilot)", "owner": "Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "Blink ID corrective-action follow-up (Sainsbury's)", "owner": "Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "Blink ID reliability — random, non-reproducible ESL misses; no command ack, retry, or event-level traceability", "owner": "Nick + Clay", "opened": null, "status": "Resolved", "resolution": "Closed per Clay 6/15 — taken off Clay's plate." },
    { "item": "QC inspection-checklist wording (Warehouse + Wire Frame) provisional — pending team/engineering; Standard confirmed 6/16; third adapter unreleased", "owner": "Clay + team/eng", "opened": "2026-06-16", "status": "Open" },

    { "item": "QC View Data dashboard not built — read/review surface over saved sessions", "owner": "Clay", "opened": "2026-06-17", "status": "Resolved", "resolution": "Built data_dashboard.html (View-Data dashboard)." },

/* ================== END TRACKER DATA ====================== */

const $ = id => document.getElementById(id);
const fmt = d => { const [y,m,day] = String(d).split("-"); return `${+m}/${+day}`; };
const isDate = s => /^\d{4}-\d{2}-\d{2}$/.test(s);
const isOpen = x => String(x && x.status || "").toLowerCase() !== "resolved";
const STATUS_LABEL = {on_track:"ON TRACK",blocked:"BLOCKED",planning:"PLANNING",not_started:"NOT STARTED",in_progress:"IN PROGRESS",done:"DONE",at_risk:"AT RISK",escalation:"ESCALATION"};

/* Load the live tracker.json (single source of truth). Fall back to the
   embedded TRACKER snapshot above ONLY if the fetch fails, so the page can
   never go blank. The "regenerate" step is now just: copy tracker.json to
   docs/tracker.json — content and the date below both come from the data. */
(async function init(){
  let data = TRACKER;
  try {
    const res = await fetch("tracker.json", {cache:"no-store"});
    if (res.ok) data = await res.json();
  } catch (e) { /* offline / file missing → use embedded fallback */ }
  render(data);
})();

/* "last updated" is DERIVED from the newest changelog date anywhere in the
   data — every change adds a changelog entry, so this can never go stale. */
function latestDate(data){
  let max = (data.meta && data.meta.last_updated) || "";
  (data.projects||[]).forEach(p => (p.changelog||[]).forEach(c => {
    if (c.date && isDate(c.date) && c.date > max) max = c.date;
  }));
  return max;
}

function render(data){
  const projects = data.projects || [];
  const cfs = data.carry_forwards || [];
  $("updated").textContent = "last updated " + latestDate(data);

  /* ---- the wire ---- */
  (function wire(){
    const start = new Date("2026-06-08T00:00:00"), end = new Date("2026-07-27T00:00:00");
    const span = end - start;
    const pos = d => Math.min(98, Math.max(2, ((new Date(d+"T00:00:00") - start) / span) * 100));
    const w = $("wire");
    w.insertAdjacentHTML("beforeend", `<div class="axis"></div>`);
    ["2026-06-08","2026-06-15","2026-06-22","2026-06-29","2026-07-06","2026-07-13","2026-07-20","2026-07-27"]
      .forEach(d => w.insertAdjacentHTML("beforeend", `<span class="tick-label" style="left:${pos(d)}%">${fmt(d)}</span>`));

    const miles = [];
    projects.forEach(p => {
      if (p.next_milestone_due) miles.push({ d: p.next_milestone_due, label: p.name.split("—")[0].trim() });
      (p.modules||[]).forEach(m => {
        if (m.due && m.status !== "done" && m.due !== p.next_milestone_due)
          miles.push({ d: m.due, label: m.name });
      });
    });
    miles.sort((a,b)=>a.d.localeCompare(b.d));
    let lastPos = -100, level = 0;
    miles.forEach(m => {
      const x = pos(m.d);
      level = (x - lastPos < 9) ? (level+1)%2 : 0;
      lastPos = x;
      w.insertAdjacentHTML("beforeend",
        `<span class="star" style="left:${x}%">★</span>
         <span class="star-label ${level? "up2":"up"}" style="left:${x}%">${m.label} · ${fmt(m.d)}</span>`);
    });

    const today = new Date();
    if (today >= start && today <= end){
      const t = ((today - start)/span)*100;
      w.insertAdjacentHTML("beforeend",
        `<div class="today-line" style="left:${t}%"></div>
         <span class="today-label" style="left:${t}%">TODAY</span>`);
    }
  })();

  /* ---- stats ---- */
  (function stats(){
    const c = s => projects.filter(p=>p.status===s).length;
    // status buckets — only render the ones with a non-zero count so empty
    // statuses don't clutter the bar (every active status now has a bucket)
    const statuses = [
      {n:c("on_track"),l:"On Track",cls:"ok"},
      {n:c("in_progress"),l:"In Progress",cls:"ok"},
      {n:c("at_risk"),l:"At Risk",cls:"warn"},
      {n:c("blocked")+c("escalation"),l:"Blocked",cls:"alert"},
      {n:c("planning"),l:"Planning",cls:""},
      {n:c("not_started"),l:"Not Started",cls:""},
    ].filter(i=>i.n>0);
    const cf = {n:cfs.filter(isOpen).length,l:"Carry-Forwards",cls:"alert"};
    const items = [...statuses, cf];
    $("stats").innerHTML = items.map(i=>`<div class="stat ${i.cls}"><b>${i.n}</b><span>${i.l}</span></div>`).join("");
  })();

  /* ---- projects ---- */
  $("projects").innerHTML = projects.map(p => `
    <div class="card">
      <div class="card-top"><h2>${p.name}</h2><span class="chip ${p.status}">${STATUS_LABEL[p.status]||p.status}</span></div>
      <div class="serves">${p.serves}</div>
      <div class="next"><b>Next:</b> ${p.next_milestone}${p.next_milestone_due ? ` — <span class="due">due ${fmt(p.next_milestone_due)}</span>` : ` — <span class="due">date TBD</span>`}</div>
      ${(p.modules&&p.modules.length)? `<ul class="modules">${p.modules.map(m=>`
        <li><span class="dot ${m.status}"></span>${m.name}
        <span class="when">${m.status==="done" ? "done "+fmt(m.completed) : "due "+fmt(m.due)}</span></li>`).join("")}</ul>` : ""}
      ${(p.blockers&&p.blockers.length)? p.blockers.map(b=>`<div class="blocker">${b}</div>`).join("") : ""}
      ${p.notes? `<div class="notes">${p.notes}</div>` : ""}
    </div>`).join("");

  /* ---- carry-forwards ---- */
  const openCfs = cfs.filter(isOpen);
  $("cf-label").textContent = `Carry-Forwards — ${openCfs.length} open (flagged weekly until resolved)`;
  const now = new Date();
  $("cfs").innerHTML = openCfs.map(c => {
    let weeks = "date TBD";
    if (isDate(c.opened)) weeks = Math.floor((now - new Date(c.opened+"T00:00:00"))/(7*864e5)) + " wks open";
    return `<div class="cf"><div class="item">${c.item}</div>
      <span class="meta">${c.owner||"—"} · opened ${isDate(c.opened)?fmt(c.opened):"TBD"} · ${weeks}</span>
      <span class="state">${String(c.status).toUpperCase()}</span></div>`;
  }).join("");

  $("principles").textContent = "Operating principles: " + (data.operating_principles||[]).join(" · ");
}

</script>
</body>
</html>
